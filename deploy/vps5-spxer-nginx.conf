# ── SPXer Services (VPS3 via Tailscale) ──────────────────────────────────
# Location blocks for the bitloom.cloud server { } block on VPS5.
#
# Services:
#   /spxer/data/       → VPS3:3600 (Data service: health, bars, contracts, signals, WS)
#   /spxer/dashboard/  → VPS3:3602 (Live dashboard: REST + WebSocket)
#   /spxer/replay/     → VPS3:3601 (Replay viewer)
#
# After editing: sudo nginx -t && sudo systemctl reload nginx

    # ── SPXer Data Service (VPS3:3600) ───────────────────────────────

    location /spxer/data/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;

        proxy_pass http://100.72.152.122:3600/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        rewrite ^/spxer/data/(.*) /$1 break;
    }

    location /spxer/data/ws {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;

        proxy_pass http://100.72.152.122:3600/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── SPXer Dashboard (VPS3:3602) ──────────────────────────────────

    location /spxer/dashboard/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;

        proxy_pass http://100.72.152.122:3602/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /spxer/dashboard;
        proxy_read_timeout 86400;
        proxy_connect_timeout 5s;
        proxy_cache_bypass $http_upgrade;
        rewrite ^/spxer/dashboard/(.*) /$1 break;
    }

    location /spxer/dashboard/api/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;

        proxy_pass http://100.72.152.122:3602/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        rewrite ^/spxer/dashboard/api/(.*) /api/$1 break;
    }

    location /spxer/dashboard/ws {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;

        proxy_pass http://100.72.152.122:3602/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── SPXer Replay Viewer (VPS3:3601) ──────────────────────────────

    location /spxer/replay/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;

        proxy_pass http://100.72.152.122:3601/replay/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /spxer/replay;
        proxy_read_timeout 86400;
        proxy_connect_timeout 5s;
        proxy_cache_bypass $http_upgrade;
    }

    location /spxer/replay/api/ {
        auth_request /oauth2/auth;
        error_page 401 = /oauth2/start;

        proxy_pass http://100.72.152.122:3601/replay/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

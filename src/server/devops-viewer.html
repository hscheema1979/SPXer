<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPXer DevOps Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 { color: #58a6ff; margin-bottom: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .status-badge {
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 14px;
    }
    .status-healthy { background: #238636; color: white; }
    .status-warning { background: #d29922; color: black; }
    .status-degraded { background: #d29922; color: black; }
    .status-critical { background: #da3633; color: white; }
    .status-stale { background: #8957e5; color: white; }
    .status-unknown { background: #30363d; color: #8b949e; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 20px;
    }
    .card h3 { color: #8b949e; font-size: 12px; text-transform: uppercase; margin-bottom: 10px; }
    .card .value { font-size: 32px; font-weight: 600; }
    .card .sub { font-size: 14px; color: #8b949e; margin-top: 5px; }
    .value.good { color: #3fb950; }
    .value.warn { color: #d29922; }
    .value.bad { color: #f85149; }

    .timeline { margin-top: 30px; }
    .timeline h2 { color: #58a6ff; margin-bottom: 15px; }
    .check-entry {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .check-time { color: #8b949e; font-size: 14px; }
    .check-summary { flex: 1; margin: 0 20px; }
    .check-issues { font-weight: 600; }
    .check-issues.issues { color: #f85149; }
    .check-issues.warnings { color: #d29922; }
    .check-issues.ok { color: #3fb950; }

    .details {
      background: #0d1117;
      border-radius: 6px;
      padding: 15px;
      margin-top: 10px;
      font-family: monospace;
      font-size: 12px;
      display: none;
    }
    .details.show { display: block; }
    .details-row { display: flex; justify-content: space-between; margin: 5px 0; }
    .details-label { color: #8b949e; }
    .details-value { color: #c9d1d9; }

    .btn {
      background: #238636;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { background: #2ea043; }
    .btn-secondary { background: #30363d; }
    .btn-secondary:hover { background: #3c444d; }

    .last-updated { color: #8b949e; font-size: 12px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔧 SPXer DevOps Monitor</h1>
      <div id="statusBadge" class="status-badge status-unknown">Loading...</div>
    </div>

    <div style="margin-bottom: 20px;">
      <button class="btn" onclick="refreshData()">Refresh Now</button>
      <button class="btn btn-secondary" onclick="toggleAutoRefresh()" id="autoRefreshBtn">Auto-Refresh: OFF</button>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Last Check</h3>
        <div class="value" id="lastCheck">--</div>
        <div class="sub" id="staleMinutes">--</div>
      </div>
      <div class="card">
        <h3>Status</h3>
        <div class="value" id="currentStatus">--</div>
        <div class="sub" id="currentSummary">--</div>
      </div>
      <div class="card">
        <h3>24h Checks</h3>
        <div class="value" id="totalChecks">--</div>
        <div class="sub" id="uptimePercent">--</div>
      </div>
      <div class="card">
        <h3>Issues (24h)</h3>
        <div class="value" id="totalIssues">--</div>
        <div class="sub" id="avgIssues">-- avg/check</div>
      </div>
      <div class="card">
        <h3>Warnings (24h)</h3>
        <div class="value" id="totalWarnings">--</div>
        <div class="sub" id="avgWarnings">-- avg/check</div>
      </div>
      <div class="card">
        <h3>Success Rate</h3>
        <div class="value" id="successRate">--</div>
        <div class="sub" id="cleanChecks">-- clean checks</div>
      </div>
    </div>

    <div class="timeline">
      <h2>Recent Checks</h2>
      <div id="timeline"></div>
    </div>

    <div class="last-updated">Last updated: <span id="lastUpdated">--</span></div>
  </div>

  <script>
    let autoRefreshInterval = null;

    async function fetchJSON(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(resp.statusText);
      return resp.json();
    }

    async function refreshData() {
      try {
        const [health, stats, results] = await Promise.all([
          fetchJSON('/devops/health'),
          fetchJSON('/devops/monitoring/stats'),
          fetchJSON('/devops/monitoring')
        ]);

        updateUI(health, stats, results);
      } catch (e) {
        console.error('Failed to refresh:', e);
        document.getElementById('statusBadge').textContent = 'Error loading';
        document.getElementById('statusBadge').className = 'status-badge status-critical';
      }
    }

    function updateUI(health, stats, results) {
      // Status badge
      const badge = document.getElementById('statusBadge');
      badge.textContent = health.status.toUpperCase();
      badge.className = `status-badge status-${health.status}`;

      // Last check
      document.getElementById('lastCheck').textContent = formatTime(health.lastCheck);
      document.getElementById('staleMinutes').textContent =
        health.staleMinutes > 0 ? `${health.staleMinutes}m ago` : 'Just now';

      // Current status
      document.getElementById('currentStatus').textContent = health.status;
      document.getElementById('currentStatus').className =
        `value ${health.status === 'healthy' ? 'good' : health.status === 'unknown' ? '' : 'bad'}`;
      document.getElementById('currentSummary').textContent = health.summary || '--';

      // Stats
      if (stats.stats) {
        const s = stats.stats;
        document.getElementById('totalChecks').textContent = s.totalChecks;
        document.getElementById('uptimePercent').textContent = `Uptime: ${s.uptime}`;
        document.getElementById('totalIssues').textContent = s.totalIssues;
        document.getElementById('totalIssues').className = `value ${s.totalIssues > 0 ? 'bad' : 'good'}`;
        document.getElementById('avgIssues').textContent = `${s.avgIssuesPerCheck} avg/check`;
        document.getElementById('totalWarnings').textContent = s.totalWarnings;
        document.getElementById('avgWarnings').textContent = `${s.avgWarningsPerCheck} avg/check`;
        document.getElementById('successRate').textContent =
          s.totalChecks > 0 ? `${Math.round((s.cleanChecks / s.totalChecks) * 100)}%` : '--';
        document.getElementById('cleanChecks').textContent = `${s.cleanChecks}/${s.totalChecks} clean`;
      }

      // Timeline
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';

      for (const result of results.results.slice(0, 20)) {
        const entry = document.createElement('div');
        entry.className = 'check-entry';

        const issuesClass = result.issues > 0 ? 'issues' : result.warnings > 0 ? 'warnings' : 'ok';
        const summaryText = result.issues > 0
          ? `${result.issues} issue${result.issues > 1 ? 's' : ''}`
          : result.warnings > 0
            ? `${result.warnings} warning${result.warnings > 1 ? 's' : ''}`
            : 'All systems normal';

        entry.innerHTML = `
          <div class="check-time">${formatTime(result.timestamp)}</div>
          <div class="check-summary check-issues ${issuesClass}">${summaryText}</div>
          <button class="btn btn-secondary" onclick="toggleDetails(this)">Details</button>
          <div class="details">
            ${renderDetails(result)}
          </div>
        `;
        timeline.appendChild(entry);
      }

      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString();
    }

    function renderDetails(result) {
      const c = result.checks;
      let html = '';

      if (c.spxFreshness) {
        html += `<div class="details-row">
          <span class="details-label">SPX Freshness:</span>
          <span class="details-value">${c.spxFreshness.staleSec}s old (${c.spxFreshness.status})</span>
        </div>`;
      }

      if (c.optionFreshness) {
        html += `<div class="details-row">
          <span class="details-label">Option Freshness:</span>
          <span class="details-value">${c.optionFreshness.staleSec}s old (${c.optionFreshness.status})</span>
        </div>`;
      }

      if (c.spxerService) {
        html += `<div class="details-row">
          <span class="details-label">SPXer Service (OPTIONAL):</span>
          <span class="details-value">${c.spxerService.status} (${c.spxerService.restarts} restarts)</span>
        </div>`;
      }

      if (c.handlerService) {
        html += `<div class="details-row">
          <span class="details-label">Event Handler (PRIMARY):</span>
          <span class="details-value">${c.handlerService.status} (${c.handlerService.restarts} restarts)</span>
        </div>`;
      }

      if (c.positionMonitorService) {
        html += `<div class="details-row">
          <span class="details-label">Position Monitor (RECOMMENDED):</span>
          <span class="details-value">${c.positionMonitorService.status} (${c.positionMonitorService.restarts} restarts)</span>
        </div>`;
      }

      if (c.signalDetection) {
        html += `<div class="details-row">
          <span class="details-label">Signal Detection:</span>
          <span class="details-value">${c.signalDetection.hasSignal ? 'Active' : 'None'} (${c.signalDetection.signalAge}m old)</span>
        </div>`;
      }

      if (c.positions) {
        html += `<div class="details-row">
          <span class="details-label">Positions:</span>
          <span class="details-value">${c.positions.open} open, ${c.positions.orphaned} orphaned, P&L: $${c.positions.dailyPnl}</span>
        </div>`;
      }

      if (c.brokerConnectivity) {
        html += `<div class="details-row">
          <span class="details-label">Broker:</span>
          <span class="details-value">${c.brokerConnectivity.status}</span>
        </div>`;
      }

      return html || 'No details available';
    }

    function formatTime(isoString) {
      if (!isoString) return '--';
      const d = new Date(isoString);
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function toggleDetails(btn) {
      const details = btn.nextElementSibling;
      details.classList.toggle('show');
    }

    function toggleAutoRefresh() {
      const btn = document.getElementById('autoRefreshBtn');
      if (autoRefreshInterval) {
        clearInterval(autoRefreshInterval);
        autoRefreshInterval = null;
        btn.textContent = 'Auto-Refresh: OFF';
      } else {
        autoRefreshInterval = setInterval(refreshData, 30000);
        btn.textContent = 'Auto-Refresh: ON';
      }
    }

    // Initial load
    refreshData();
  </script>
</body>
</html>

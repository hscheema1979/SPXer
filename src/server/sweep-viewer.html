<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0a0a0f">
<title>SPXer Config Leaderboard</title>
<style>
  /* ───────── shadcn-style design tokens (dark) ───────── */
  :root {
    --background: #0a0a0f;
    --foreground: #e0e0e0;
    --muted: #888;
    --muted-foreground: #555;
    --card: #111118;
    --card-elevated: #0d0d14;
    --border: #1a1a24;
    --border-strong: #222;
    --input: #1a1a24;
    --primary: #8b8bff;
    --primary-soft: #a78bfa;
    --success: #10b981;
    --destructive: #f43f5e;
    --info: #3b82f6;
    --warning: #f59e0b;
    --radius: 8px;
    --radius-sm: 6px;
    --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Consolas, monospace;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    font-size: 13px;
    line-height: 1.45;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ───────── Nav bar ───────── */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 12px;
    background: var(--card-elevated);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  .nav-bar::-webkit-scrollbar { height: 0; display: none; }
  .nav-bar a {
    color: var(--muted-foreground);
    text-decoration: none;
    padding: 10px 14px;
    transition: color 0.15s, border-color 0.15s;
    border-bottom: 2px solid transparent;
    flex-shrink: 0;
  }
  .nav-bar a:hover { color: var(--primary-soft); }
  .nav-bar a.active { color: var(--primary); border-bottom-color: var(--primary); }
  .nav-brand {
    color: var(--primary) !important;
    font-weight: 700;
    font-size: 13px;
    padding-right: 16px !important;
    border: none !important;
    cursor: default;
    letter-spacing: -0.01em;
  }
  @media (min-width: 640px) {
    .nav-bar { padding: 0 16px; }
    .nav-brand { padding-right: 20px !important; }
  }

  /* ───────── Header (stats + refresh) ───────── */
  .header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--card);
    border-bottom: 1px solid var(--border-strong);
  }
  .header h1 { display: none; }
  .stats {
    margin-left: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    font-size: 11px;
    color: var(--muted);
  }
  .stats .num { color: var(--primary-soft); font-weight: 600; font-family: var(--font-mono); }
  @media (min-width: 640px) {
    .header { padding: 12px 16px; gap: 16px; }
    .stats { font-size: 12px; }
  }

  /* ───────── Filter bar ───────── */
  .filters {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: var(--card-elevated);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-group { display: flex; align-items: center; gap: 6px; }
  .filter-group label {
    font-size: 10px;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }
  .filter-group select,
  .sort-bar select {
    background: var(--input);
    color: var(--foreground);
    border: 1px solid var(--border-strong);
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    min-height: 32px;
    touch-action: manipulation;
  }
  .filter-group select:focus,
  .sort-bar select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(139,139,255,.18); }
  .filter-group select.active { border-color: var(--primary); color: var(--primary); }

  /* ───────── Multi-select dropdown ───────── */
  .multi-select {
    position: relative;
    display: inline-block;
  }
  .multi-select-btn {
    background: var(--input);
    color: var(--foreground);
    border: 1px solid var(--border-strong);
    padding: 6px 24px 6px 8px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    min-height: 32px;
    white-space: nowrap;
    position: relative;
    touch-action: manipulation;
    transition: border-color 0.15s;
  }
  .multi-select-btn::after {
    content: '▾';
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--muted);
  }
  .multi-select-btn:hover { border-color: var(--muted); }
  .multi-select-btn.active { border-color: var(--primary); color: var(--primary); }
  .multi-select-btn .ms-count {
    background: var(--primary);
    color: var(--background);
    font-size: 9px;
    font-weight: 700;
    padding: 0 5px;
    border-radius: 999px;
    margin-left: 4px;
  }
  .multi-select-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 4px 0;
    min-width: 140px;
    max-height: 260px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
  }
  .multi-select-dropdown.open { display: block; }
  .multi-select-dropdown label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
    color: var(--foreground);
    transition: background 0.1s;
    text-transform: none;
    letter-spacing: 0;
    white-space: nowrap;
  }
  .multi-select-dropdown label:hover { background: rgba(139,139,255,.08); }
  .multi-select-dropdown input[type="checkbox"] {
    accent-color: var(--primary);
    width: 14px;
    height: 14px;
    cursor: pointer;
  }
  .multi-select-dropdown .ms-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }
  .multi-select-dropdown .ms-actions {
    display: flex;
    gap: 4px;
    padding: 4px 8px;
  }
  .multi-select-dropdown .ms-actions button {
    background: transparent;
    border: none;
    color: var(--primary);
    font-size: 10px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .multi-select-dropdown .ms-actions button:hover { background: rgba(139,139,255,.12); }

  .filter-sep { width: 1px; height: 20px; background: var(--border-strong); margin: 0 4px; }
  .filter-reset,
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 32px;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-reset:hover { color: var(--destructive); border-color: var(--destructive); }
  .refresh-btn:hover { color: var(--success); border-color: var(--success); }
  .refresh-btn.refreshing { color: var(--primary); border-color: var(--primary); }
  .refresh-btn.refreshing .refresh-icon { animation: spin 0.6s linear infinite; display: inline-block; }
  .refresh-badge { background: var(--success); color: var(--background); font-size: 9px; font-weight: 700; padding: 0 5px; border-radius: 999px; min-width: 14px; text-align: center; }
  .filter-count { font-size: 11px; color: var(--muted-foreground); margin-left: auto; }

  /* ───────── Symbol quick-filter pills (prominent row above generic filters) ───────── */
  .sym-filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--background);
    border-bottom: 1px solid var(--border);
  }
  .sym-filter-bar > label {
    font-size: 11px;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 4px;
  }
  .sym-pill {
    font-family: var(--font-mono, monospace);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
  }
  .sym-pill:hover { color: var(--foreground); border-color: var(--foreground); }
  .sym-pill.active.all {
    background: rgba(255,255,255,0.08);
    color: var(--foreground);
    border-color: var(--foreground);
  }
  .sym-pill.active.spx {
    background: rgba(139,139,255,0.18);
    color: #8b8bff;
    border-color: #8b8bff;
  }
  .sym-pill.active.ndx {
    background: rgba(251,146,60,0.18);
    color: #fb923c;
    border-color: #fb923c;
  }
  .sym-pill.active.baskets {
    background: rgba(139,92,246,0.18);
    color: #8b5cf6;
    border-color: #8b5cf6;
  }
  .sym-pill.active.singles {
    background: rgba(34,197,94,0.18);
    color: #22c55e;
    border-color: #22c55e;
  }
  .sym-pill-count {
    font-size: 9px;
    font-weight: 600;
    color: var(--muted-foreground);
    margin-left: 6px;
    opacity: 0.7;
  }
  .sym-pill.active .sym-pill-count { opacity: 1; }

  /* ───────── Sort controls ───────── */
  .sort-bar {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: var(--background);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }
  .sort-bar > label {
    font-size: 10px;
    color: var(--muted-foreground);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .sort-btn {
    background: var(--input);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    min-height: 32px;
    transition: color 0.15s, border-color 0.15s, background-color 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .sort-btn:hover { border-color: #444; color: var(--foreground); }
  .sort-btn.active {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(139,139,255,0.08);
  }

  /* ───────── Table ───────── */
  .table-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: calc(100dvh - 220px);
    position: relative;
    -webkit-overflow-scrolling: touch;
  }
  @media (min-width: 768px) {
    .table-wrap { max-height: calc(100dvh - 180px); }
  }

  /* ───────── Loading overlay ───────── */
  .loading-overlay {
    position: absolute; inset: 0; z-index: 10;
    background: rgba(10, 10, 15, 0.75);
    backdrop-filter: blur(2px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.15s ease;
  }
  .loading-overlay.active { opacity: 1; pointer-events: auto; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border-strong);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .loading-label { color: var(--primary); font-size: 12px; margin-left: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* All 15 columns stay visible at every width; the .table-wrap scrolls
     horizontally on phones/tablets so users can see best/worst/avg day,
     green days, sharpe, etc. without losing them. */
  table { width: 100%; border-collapse: collapse; min-width: 1100px; font-family: var(--font-mono); }
  th {
    position: sticky; top: 0; z-index: 2;
    background: var(--card);
    text-align: left;
    padding: 10px 8px;
    color: var(--muted-foreground);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border-strong);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    font-family: var(--font-sans);
    font-weight: 600;
  }
  th:hover { color: var(--primary); }
  th.sorted { color: var(--primary); }
  th .arrow { font-size: 8px; margin-left: 2px; }
  td {
    padding: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    white-space: nowrap;
  }
  tr:hover td { background: rgba(26,26,40,0.8); }

  .rank { width: 36px; text-align: center; }
  .medal { font-size: 13px; }
  .pnl-pos { color: var(--success); }
  .pnl-neg { color: var(--destructive); }
  .pnl-zero { color: var(--muted-foreground); }
  .bar { display: inline-block; height: 10px; border-radius: 2px; min-width: 1px; vertical-align: middle; margin-right: 4px; }
  .bar-g { background: var(--success); }
  .bar-r { background: var(--destructive); }
  .cfg-link { color: var(--primary); text-decoration: none; font-size: 12px; font-weight: 500; }
  .cfg-link:hover { text-decoration: underline; }
  .param { color: var(--muted-foreground); font-size: 10px; }
  .param b { color: #aaa; }

  /* ───────── Daily expand ───────── */
  .daily-row td {
    background: var(--card-elevated) !important;
    padding: 0 !important;
  }
  .daily-wrap { padding: 12px 14px 14px; }
  @media (min-width: 640px) { .daily-wrap { padding: 12px 20px 16px 40px; } }
  .daily-wrap h3 {
    font-size: 11px;
    color: var(--primary);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
  }
  .daily-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 6px;
  }
  .daily-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 6px 10px;
    font-size: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .daily-card:hover { border-color: #444; }
  .hl td { background: rgba(26,26,47,0.9) !important; }

  .footer {
    padding: 10px 16px;
    text-align: center;
    color: var(--muted-foreground);
    font-size: 10px;
    border-top: 1px solid var(--border);
  }

  /* ───────── Delete button ───────── */
  .del-btn {
    background: none;
    border: none;
    color: var(--muted-foreground);
    cursor: pointer;
    font-size: 14px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    opacity: 0.35;
    transition: opacity 0.1s, color 0.1s, background-color 0.1s;
    touch-action: manipulation;
  }
  tr:hover .del-btn { opacity: 0.7; }
  .del-btn:hover { opacity: 1 !important; color: var(--destructive); background: rgba(244,63,94,0.1); }
  @media (max-width: 767px) { .del-btn { opacity: 0.6; } }

  /* ───────── Dialog (shadcn-style) ───────── */
  .del-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .del-modal-overlay.active { display: flex; }
  .del-modal {
    background: var(--card);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 20px 22px;
    width: 100%;
    max-width: 480px;
    max-height: 90dvh;
    overflow-y: auto;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }
  .del-modal h3 {
    font-size: 15px;
    color: var(--destructive);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .del-modal p {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 8px;
    line-height: 1.5;
    word-break: break-word;
  }
  .del-modal .cfg-name { color: var(--foreground); font-weight: 600; }
  .del-modal .del-stats { color: var(--muted); font-size: 12px; margin-bottom: 18px; }
  .del-modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .del-modal-actions button {
    padding: 8px 16px;
    min-height: 36px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    touch-action: manipulation;
    transition: background-color 0.15s, border-color 0.15s, color 0.15s;
  }
  .del-cancel { background: var(--input); color: var(--muted); border: 1px solid var(--border-strong); }
  .del-cancel:hover { color: var(--foreground); border-color: #555; }
  .del-confirm {
    background: rgba(244,63,94,0.12);
    color: var(--destructive);
    border: 1px solid rgba(244,63,94,0.4);
  }
  .del-confirm:hover { background: rgba(244,63,94,0.2); }

  /* ───────── Set Live button ───────── */
  .live-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted-foreground);
    cursor: pointer;
    font-size: 10px;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    opacity: 0.45;
    transition: opacity 0.1s, color 0.1s, background-color 0.1s, border-color 0.1s;
    white-space: nowrap;
    font-weight: 500;
    touch-action: manipulation;
  }
  tr:hover .live-btn { opacity: 0.8; }
  .live-btn:hover {
    opacity: 1 !important;
    color: var(--info);
    background: rgba(59,130,246,0.1);
    border-color: rgba(59,130,246,0.35);
  }
  @media (max-width: 767px) { .live-btn { opacity: 0.7; } }
  .live-badge {
    display: inline-block;
    background: rgba(59,130,246,0.14);
    color: var(--info);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 999px;
    border: 1px solid rgba(59,130,246,0.3);
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.04em;
  }
  tr.is-live td { border-left: 2px solid var(--info); }
  tr.is-live td:first-child { border-left: 2px solid var(--info); }

  /* ───────── Symbol badge (SPX / NDX) ───────── */
  .sym-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    margin-right: 6px;
    vertical-align: middle;
    letter-spacing: 0.05em;
    font-family: var(--font-mono, monospace);
  }
  .sym-badge.spx { background: rgba(139,139,255,0.14); color: #8b8bff; border: 1px solid rgba(139,139,255,0.35); }
  .sym-badge.ndx { background: rgba(251,146,60,0.14); color: #fb923c; border: 1px solid rgba(251,146,60,0.35); }

  /* ───────── Live indicator in header ───────── */
  .live-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.25);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    color: var(--info);
  }
  .live-indicator .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--info);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  }
  .live-indicator .cfg-id { color: var(--primary); font-weight: 600; font-family: var(--font-mono); }

  /* ───────── Scrollbar polish ───────── */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }
</style>
</head>
<body>

<div class="nav-bar">
  <span class="nav-brand">SPXer</span>
  <a href="/replay/" data-path="/replay/">Replay</a>
  <a href="/replay/#live" data-path="/replay/#live">Live</a>
  <a href="/replay/sweep" data-path="/replay/sweep" class="active">🏆 Leaderboard</a>
  <a href="/replay/backfill" data-path="/replay/backfill">Backfill</a>
  <a href="/replay/journal" data-path="/replay/journal">📓 Journal</a>
  <a href="/replay/account" data-path="/replay/account">💰 Account</a>
</div>

<div class="header">
  <button class="refresh-btn" id="refresh-btn" onclick="refreshData()" title="Refresh leaderboard (preserves filters)">
    <span class="refresh-icon">↻</span> Refresh
  </button>
  <span class="live-indicator" id="live-indicator" style="display:none">
    <span class="dot"></span> Live: <span class="cfg-id" id="live-cfg-id">—</span>
  </span>
  <div class="stats">
    <span>Configs: <span class="num" id="total-count">-</span></span>
    <span>Showing: <span class="num" id="showing-count">-</span></span>
    <span id="refresh-status" style="color:#555"></span>
  </div>
</div>

<script>
const _BASE = (document.querySelector('meta[name="base-path"]')?.content || '');
const API = _BASE + '/replay/api';

// Fix nav links for reverse proxy base path
if (_BASE) {
  document.querySelectorAll('.nav-bar a[data-path]').forEach(a => {
    a.href = _BASE + a.dataset.path;
  });
}

let allRows = [];
let filteredRows = [];
let currentSort = 'edge';
let currentDir = 'DESC';
let filters = {};
let liveConfigId = null; // currently active live config (single-strike)
let liveBasketId = null; // currently deployed live basket (if any)

// Compact currency formatter: abbreviates large amounts (>= $10K) as $K/M/B;
// smaller amounts get thousands separators. Handles negatives.
function fmtMoney(n) {
  if (n == null || isNaN(n)) return '$0';
  const sign = n < 0 ? '-' : '';
  const abs = Math.abs(n);
  if (abs >= 1e9) return sign + '$' + (abs / 1e9).toFixed(2) + 'B';
  if (abs >= 1e6) return sign + '$' + (abs / 1e6).toFixed(2) + 'M';
  if (abs >= 1e4) return sign + '$' + (abs / 1e3).toFixed(1) + 'K';
  return sign + '$' + Math.round(abs).toLocaleString();
}

// ── Filter definitions — extracted from data ──
const FILTER_KEYS = [
  { key: 'symbol',       label: 'Symbol' },
  { key: 'strikeOffset', label: 'Strike', multi: true },
  { key: 'maxContracts', label: 'Max Contracts', multi: true },
  { key: 'hmaFast',      label: 'HMA Fast' },
  { key: 'hmaSlow',      label: 'HMA Slow' },
  { key: 'dirTf',        label: 'Dir TF' },
  { key: 'exitTf',       label: 'Exit TF' },
  { key: 'signalTf',     label: 'Signal TF' },
  { key: 'exitStrategy', label: 'Exit Strat' },
  { key: 'stopLoss',     label: 'Stop Loss' },
  { key: 'tpMult',       label: 'TP Mult' },
  { key: 'requireDir',   label: 'Req Dir' },
  { key: 'enableHma',    label: 'HMA Sig' },
  { key: 'enableRsi',    label: 'RSI Sig' },
  { key: 'enablePxHma',  label: 'Px×HMA' },
  { key: 'enableEma',    label: 'EMA Sig' },
  { key: 'regimeEnabled',label: 'Regime' },
  { key: 'scannersEnabled',label:'Scanners' },
];
let multiFilters = {}; // key → Set of selected values

function buildFilters() {
  // Collect unique values per param
  const valuesMap = {};
  for (const f of FILTER_KEYS) valuesMap[f.key] = new Set();
  for (const row of allRows) {
    if (!row.params) continue;
    for (const f of FILTER_KEYS) {
      const v = row.params[f.key];
      if (v !== undefined && v !== null) valuesMap[f.key].add(String(v));
    }
  }

  const container = document.getElementById('filters');
  let html = '';

  for (const f of FILTER_KEYS) {
    const vals = [...valuesMap[f.key]].sort((a, b) => {
      // Sort strike offsets: ATM first, then OTM1, OTM2..., then ITM
      if (f.key === 'strikeOffset') {
        const order = v => v === 'ATM' ? 0 : v === 'OTM' ? 1 : v.startsWith('OTM') ? 1 + parseInt(v.slice(3)||'0') * 0.01 : 100;
        return order(a) - order(b);
      }
      const na = Number(a), nb = Number(b);
      if (!isNaN(na) && !isNaN(nb)) return na - nb;
      return a.localeCompare(b);
    });
    // Skip filters with only 1 unique value (not useful)
    if (vals.length <= 1) continue;

    if (f.multi) {
      const selected = multiFilters[f.key] || new Set();
      const count = selected.size;
      const btnLabel = count === 0 ? 'All' : count === 1 ? [...selected][0] : `${count} selected`;
      html += `<div class="filter-group">
        <label>${f.label}</label>
        <div class="multi-select" data-ms-key="${f.key}">
          <button type="button" class="multi-select-btn${count > 0 ? ' active' : ''}" onclick="toggleMultiDropdown('${f.key}')">
            ${btnLabel}${count > 0 ? `<span class="ms-count">${count}</span>` : ''}
          </button>
          <div class="multi-select-dropdown" id="ms-dd-${f.key}">
            <div class="ms-actions">
              <button onclick="msSelectAll('${f.key}')">All</button>
              <button onclick="msClearAll('${f.key}')">Clear</button>
            </div>
            <div class="ms-divider"></div>
            ${vals.map(v => {
              const display = v === 'true' ? '✓' : v === 'false' ? '✗' : v;
              const checked = selected.has(v) ? 'checked' : '';
              return `<label><input type="checkbox" value="${v}" ${checked} onchange="onMultiFilter('${f.key}', this)">${display}</label>`;
            }).join('')}
          </div>
        </div>
      </div>`;
    } else {
      html += `<div class="filter-group">
        <label>${f.label}</label>
        <select data-filter="${f.key}" onchange="onFilter()">
          <option value="">All</option>
          ${vals.map(v => {
            const display = v === 'true' ? '✓' : v === 'false' ? '✗' : v;
            return `<option value="${v}">${display}</option>`;
          }).join('')}
        </select>
      </div>`;
    }
  }

  html += `<div class="filter-sep"></div>`;
  html += `<button class="filter-reset" onclick="resetFilters()">Reset</button>`;
  html += `<span class="filter-count" id="filter-count"></span>`;
  container.innerHTML = html;

  // Restore single-select filter values
  for (const [key, val] of Object.entries(filters)) {
    const sel = document.querySelector(`[data-filter="${key}"]`);
    if (sel) { sel.value = val; sel.classList.toggle('active', !!val); }
  }
}

function onFilter() {
  filters = {};
  document.querySelectorAll('[data-filter]').forEach(sel => {
    const key = sel.dataset.filter;
    const val = sel.value;
    if (val) filters[key] = val;
    sel.classList.toggle('active', !!val);
  });
  syncSymbolPillsFromFilters();
  applyFilters();
}

// ── Multi-select filter helpers ──
function toggleMultiDropdown(key) {
  // Close all other dropdowns first
  document.querySelectorAll('.multi-select-dropdown.open').forEach(dd => {
    if (dd.id !== `ms-dd-${key}`) dd.classList.remove('open');
  });
  const dd = document.getElementById(`ms-dd-${key}`);
  dd.classList.toggle('open');
}

function onMultiFilter(key, checkbox) {
  if (!multiFilters[key]) multiFilters[key] = new Set();
  if (checkbox.checked) {
    multiFilters[key].add(checkbox.value);
  } else {
    multiFilters[key].delete(checkbox.value);
  }
  if (multiFilters[key].size === 0) delete multiFilters[key];
  updateMultiSelectBtn(key);
  applyFilters();
}

function msSelectAll(key) {
  const dd = document.getElementById(`ms-dd-${key}`);
  dd.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; });
  delete multiFilters[key];
  updateMultiSelectBtn(key);
  applyFilters();
}

function msClearAll(key) {
  const dd = document.getElementById(`ms-dd-${key}`);
  dd.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = false; });
  delete multiFilters[key];
  updateMultiSelectBtn(key);
  applyFilters();
}

function updateMultiSelectBtn(key) {
  const container = document.querySelector(`[data-ms-key="${key}"]`);
  if (!container) return;
  const btn = container.querySelector('.multi-select-btn');
  const selected = multiFilters[key];
  const count = selected ? selected.size : 0;
  if (count === 0) {
    btn.innerHTML = 'All';
    btn.classList.remove('active');
  } else if (count === 1) {
    const val = [...selected][0];
    btn.innerHTML = `${val}<span class="ms-count">1</span>`;
    btn.classList.add('active');
  } else {
    btn.innerHTML = `${count} selected<span class="ms-count">${count}</span>`;
    btn.classList.add('active');
  }
}

// Close multi-select dropdowns when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.multi-select')) {
    document.querySelectorAll('.multi-select-dropdown.open').forEach(dd => dd.classList.remove('open'));
  }
});

function resetFilters() {
  document.querySelectorAll('[data-filter]').forEach(sel => {
    sel.value = '';
    sel.classList.remove('active');
  });
  // Reset multi-select checkboxes and buttons
  document.querySelectorAll('.multi-select-dropdown input[type="checkbox"]').forEach(cb => { cb.checked = false; });
  for (const key of Object.keys(multiFilters)) updateMultiSelectBtn(key);
  filters = {};
  multiFilters = {};
  // Update all multi-select buttons to show "All"
  document.querySelectorAll('[data-ms-key]').forEach(ms => {
    const btn = ms.querySelector('.multi-select-btn');
    if (btn) { btn.innerHTML = 'All'; btn.classList.remove('active'); }
  });
  basketFilter = '';
  syncSymbolPillsFromFilters();
  document.querySelectorAll('#sym-filter-bar [data-basket]').forEach(btn => {
    btn.classList.toggle('active', !btn.dataset.basket);
  });
  applyFilters();
}

// ── Symbol quick-filter pills (SPX / NDX / All) ──
// These are the prominent primary filter — mirror state into the generic
// sidebar's `symbol` dropdown so both stay in sync.
function setSymbolFilter(sym) {
  if (sym) filters.symbol = sym;
  else delete filters.symbol;
  // Sync sidebar select if it's rendered
  const sel = document.querySelector('[data-filter="symbol"]');
  if (sel) {
    sel.value = sym || '';
    sel.classList.toggle('active', !!sym);
  }
  syncSymbolPillsFromFilters();
  applyFilters();
}

function syncSymbolPillsFromFilters() {
  const active = filters.symbol || '';
  document.querySelectorAll('#sym-filter-bar [data-sym]').forEach(btn => {
    btn.classList.toggle('active', (btn.dataset.sym || '') === active);
  });
}

// ── Basket quick-filter pills (All / Baskets / Singles) ──
let basketFilter = '';

function setBasketFilter(val) {
  basketFilter = val;
  document.querySelectorAll('#sym-filter-bar [data-basket]').forEach(btn => {
    btn.classList.toggle('active', (btn.dataset.basket || '') === val);
  });
  applyFilters();
}

function updateBasketPillCounts() {
  if (!Array.isArray(allRows)) return;
  let baskets = 0, singles = 0, members = 0;
  for (const r of allRows) {
    if (r.isBasketMember) members++;
    else if (r.isBasket) baskets++;
    else singles++;
  }
  const nonMembers = baskets + singles;
  const el = (id) => document.getElementById(id);
  if (el('basket-count-all')) el('basket-count-all').textContent = ` (${nonMembers})`;
  if (el('basket-count-baskets')) el('basket-count-baskets').textContent = ` (${baskets})`;
  if (el('basket-count-singles')) el('basket-count-singles').textContent = ` (${singles})`;
}

function updateSymbolPillCounts() {
  if (!Array.isArray(allRows)) return;
  const counts = { '': allRows.length, SPX: 0, NDX: 0 };
  for (const r of allRows) {
    const s = (r.params?.symbol || (r.configId?.startsWith('ndx-') ? 'NDX' : 'SPX')).toUpperCase();
    if (counts[s] !== undefined) counts[s]++;
  }
  const all = document.getElementById('sym-count-all');
  const spx = document.getElementById('sym-count-spx');
  const ndx = document.getElementById('sym-count-ndx');
  if (all) all.textContent = ` (${counts['']})`;
  if (spx) spx.textContent = ` (${counts.SPX})`;
  if (ndx) ndx.textContent = ` (${counts.NDX})`;
}

function applyFilters() {
  filteredRows = allRows.filter(row => {
    // Always hide basket members (individual legs) unless viewing members explicitly
    if (basketFilter !== 'members' && row.isBasketMember) return false;
    if (basketFilter === 'baskets' && !row.isBasket) return false;
    if (basketFilter === 'singles' && (row.isBasket || row.isBasketMember)) return false;
    if (basketFilter === 'members' && !row.isBasketMember) return false;
    if (!row.params) return true;
    // Single-select filters
    for (const [key, val] of Object.entries(filters)) {
      if (String(row.params[key]) !== val) return false;
    }
    // Multi-select filters
    for (const [key, selectedSet] of Object.entries(multiFilters)) {
      if (selectedSet.size === 0) continue;
      if (!selectedSet.has(String(row.params[key]))) return false;
    }
    return true;
  });
  sortRows();
  renderTable();
  const hasFilters = Object.keys(filters).length > 0 || Object.keys(multiFilters).length > 0;
  document.getElementById('filter-count').textContent =
    hasFilters
      ? `${filteredRows.length} of ${allRows.length} configs match`
      : '';
}

function sortRows() {
  const col = currentSort;
  const mult = currentDir === 'DESC' ? -1 : 1;
  filteredRows.sort((a, b) => {
    const av = a[col] ?? 0, bv = b[col] ?? 0;
    return (av - bv) * mult;
  });
}

// ── Table rendering ──

function renderTable() {
  const rows = filteredRows;
  document.getElementById('showing-count').textContent = rows.length;
  const tbody = document.getElementById('tbody');

  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="15" style="text-align:center;padding:40px;color:#444">No results match filters</td></tr>';
    return;
  }

  const maxPnl = Math.max(...rows.map(r => Math.abs(r.totalPnl)), 1);

  tbody.innerHTML = rows.map((r, i) => {
    const rank = i + 1;
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : String(rank);
    const pc = r.totalPnl > 0 ? 'pnl-pos' : r.totalPnl < 0 ? 'pnl-neg' : 'pnl-zero';
    const wc = r.worstDay > -300 ? 'pnl-pos' : r.worstDay > -600 ? 'pnl-zero' : 'pnl-neg';
    const bw = Math.max(1, Math.round(Math.abs(r.totalPnl) / maxPnl * 60));
    const bc = r.totalPnl >= 0 ? 'bar-g' : 'bar-r';

    // Param pills
    const p = r.params || {};
    const pills = `<span class="param">` +
      `<b>${p.hmaFast||'?'}×${p.hmaSlow||'?'}</b> ` +
      `${p.dirTf||'?'}D/${p.exitTf||'?'}E ` +
      `${p.exitStrategy === 'scannerReverse' ? 'REV' : 'TP'} ` +
      `SL${p.stopLoss ?? '?'}% TP${p.tpMult ?? '?'}x` +
      (p.requireDir ? ' 🎯' : '') +
      `</span>`;

    const isBasket = !!r.isBasket;
    const isLive = isBasket
      ? r.configId === liveBasketId
      : r.configId === liveConfigId;
    const liveBadge = isLive
      ? `<span class="live-badge">${isBasket ? 'LIVE BASKET' : 'LIVE'}</span>`
      : (isBasket ? `<span class="live-badge" style="background:#8b5cf622;color:#8b5cf6;border-color:#8b5cf644">BASKET ${r.memberCount}</span>` : '');
    const liveClass = isLive ? ' is-live' : '';
    const setLiveBtn = isLive
      ? `<span style="color:#3b82f6;font-size:10px">● ${isBasket ? 'basket deployed' : 'active'}</span>`
      : isBasket
        ? `<button class="live-btn" style="background:#8b5cf622;color:#8b5cf6;border-color:#8b5cf644" onclick="event.stopPropagation();deployBasket('${r.configId}','${(r.name||r.configId).replace(/'/g,"\\'")}',${r.memberCount})" title="Deploy basket as ${r.memberCount} live agents">🎯 Deploy Basket (${r.memberCount})</button>`
        : `<button class="live-btn" onclick="event.stopPropagation();setLiveConfig('${r.configId}','${(r.name||r.configId).replace(/'/g,"\\'")}',${((r.edge||0)*100).toFixed(1)})" title="Set as live config">▶ Set Live</button>`;

    const sym = (r.params?.symbol || (r.configId.startsWith('ndx-') ? 'NDX' : 'SPX')).toUpperCase();
    const symBadge = `<span class="sym-badge ${sym.toLowerCase()}" title="Underlying: ${sym}">${sym}</span>`;

    return `<tr data-cid="${r.configId}" class="${liveClass}" onclick="toggleDaily('${r.configId}', this)">
      <td class="rank">${medal}</td>
      <td>${symBadge}<a class="cfg-link" href="#" target="_blank" onclick="event.stopPropagation();event.preventDefault();window.open(replayUrl('${r.configId}'),'_blank')">${sweepConfigLabel(r)}</a>${liveBadge}<br>${pills}</td>
      <td class="${r.edge > 0 ? 'pnl-pos' : 'pnl-neg'}"><b>${(r.edge * 100).toFixed(1)}%</b></td>
      <td>${(r.rMultiple || 0).toFixed(2)}</td>
      <td class="${r.ev > 0 ? 'pnl-pos' : 'pnl-neg'}">${(r.ev || 0).toFixed(2)}%</td>
      <td>${(r.winRate * 100).toFixed(1)}%</td>
      <td style="color:#888">${((r.breakEvenWR || 0) * 100).toFixed(1)}%</td>
      <td>${r.trades}</td>
      <td class="${pc}"><b>${fmtMoney(r.totalPnl)}</b></td>
      <td class="${pc}">${fmtMoney(r.avgDailyPnl)}</td>
      <td class="${wc}">${fmtMoney(r.worstDay)}</td>
      <td>${r.profitDays}/${r.days}</td>
      <td>${r.days}</td>
      <td><span class="bar ${bc}" style="width:${bw}px"></span></td>
      <td style="white-space:nowrap">${setLiveBtn} <button class="del-btn" onclick="event.stopPropagation();openDeleteModal('${r.configId}','${(r.name||r.configId).replace(/'/g,"\\'")}',${r.days},${r.trades})" title="Delete config">🗑</button></td>
    </tr>`;
  }).join('');

  document.getElementById('footer').textContent =
    rows.length > 0
      ? `${rows.length} configs | Best Edge: ${(Math.max(...rows.map(r=>r.edge||0)) * 100).toFixed(1)}% | Best R-Mult: ${Math.max(...rows.map(r=>r.rMultiple||0)).toFixed(2)} | Best EV: ${Math.max(...rows.map(r=>r.ev||0)).toFixed(2)}% | Best P&L: ${fmtMoney(Math.max(...rows.map(r=>r.totalPnl)))}`
      : '';
}

// ── Daily expand ──

async function toggleDaily(configId, rowEl) {
  const existing = document.querySelector('.daily-row');
  if (existing) {
    const wasForSame = existing.dataset.config === configId;
    existing.remove();
    document.querySelectorAll('.hl').forEach(r => r.classList.remove('hl'));
    if (wasForSame) return;
  }

  rowEl.classList.add('hl');

  // Fetch both daily breakdown and analysis in parallel
  const [dailyRes, analysisRes] = await Promise.all([
    fetch(`${API}/sweep/${configId}/daily`).then(r => r.json()),
    fetch(`${API}/config/${configId}/analysis`).then(r => r.json()).catch(() => null),
  ]);
  const daily = dailyRes;
  const a = analysisRes;

  const tr = document.createElement('tr');
  tr.className = 'daily-row';
  tr.dataset.config = configId;
  const td = document.createElement('td');
  td.colSpan = 15;

  // Build analysis summary if available
  let analysisHtml = '';
  if (a && !a.error) {
    const p = a.performance;
    const s = a.setup;
    const pnlCls = v => v > 0 ? 'pnl-pos' : v < 0 ? 'pnl-neg' : '';

    // Equity sparkline SVG
    const eq = a.equityCurve || [];
    let sparkSvg = '';
    if (eq.length > 1) {
      const vals = eq.map(e => e.equity);
      const minE = Math.min(0, ...vals), maxE = Math.max(...vals), range = maxE - minE || 1;
      const w = 160, h = 30;
      const pts = vals.map((v, i) => `${(i/(vals.length-1))*w},${h-((v-minE)/range)*h}`).join(' ');
      sparkSvg = `<svg style="width:100%;height:30px" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="#10b981" stroke-width="1.5"/></svg>`;
    }

    const tags = [
      ...(a.strengths || []).map(s => `<span style="background:#10b98118;color:#10b981;border:1px solid #10b98133;font-size:10px;padding:1px 6px;border-radius:3px">✅ ${s}</span>`),
      ...(a.explore || []).map(s => `<span style="background:#f59e0b18;color:#f59e0b;border:1px solid #f59e0b33;font-size:10px;padding:1px 6px;border-radius:3px">🔬 ${s}</span>`),
    ].join(' ');

    const stat = (l, v, c='') => `<span style="color:#666">${l}</span> <span style="color:${c||'#e0e0e0'};font-weight:600">${v}</span>`;
    const exitEntries = Object.entries(a.exitReasons).sort((a,b) => b[1]-a[1]);
    const exitStr = exitEntries.map(([r,c]) => {
      const labels = {take_profit:'TP',stop_loss:'SL',signal_reversal:'REV',time_exit:'EOD'};
      return `${labels[r]||r}:${c}`;
    }).join(' · ');

    analysisHtml = `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;font-size:11px">
      <div style="background:#111118;border:1px solid #1a1a24;border-radius:4px;padding:6px 8px">
        <div style="font-size:9px;color:#555;text-transform:uppercase;margin-bottom:4px">Performance</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px 16px">
          ${stat('Expectancy', '$'+p.expectancy.toFixed(0)+'/t', p.expectancy>0?'#10b981':'#f43f5e')}
          ${stat('W/L Ratio', p.winLossRatio.toFixed(2)+'x', p.winLossRatio>=2?'#10b981':'')}
          ${stat('Max DD', '$'+p.maxDrawdown.toLocaleString(undefined,{maximumFractionDigits:0}), p.maxDrawdown>0?'#f43f5e':'#10b981')}
          ${stat('Worst Streak', p.worstStreak+'d', p.worstStreak>=3?'#f43f5e':'')}
        </div>
        ${sparkSvg}
      </div>
      <div style="background:#111118;border:1px solid #1a1a24;border-radius:4px;padding:6px 8px">
        <div style="font-size:9px;color:#555;text-transform:uppercase;margin-bottom:4px">Execution</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px 16px">
          ${stat('Avg Hold', p.avgHoldMin.toFixed(0)+'m')}
          ${stat('Avg Entry', '$'+p.avgEntryPrice.toFixed(2))}
          ${stat('Peak BP', '$'+p.peakBuyingPower.toLocaleString(undefined,{maximumFractionDigits:0}), '#8b8bff')}
          ${stat('Exits', exitStr)}
        </div>
      </div>
      <div style="background:#111118;border:1px solid #1a1a24;border-radius:4px;padding:6px 8px">
        <div style="font-size:9px;color:#555;text-transform:uppercase;margin-bottom:4px">Setup</div>
        <div style="font-size:11px;color:#aaa;line-height:1.6">
          <b style="color:#e0e0e0">HMA ${s.hma}</b> · ${s.timeframes} · ${s.signals.join('+')||'—'}<br>
          ${s.otm} · SL${s.stopLoss}% TP${s.tpMult}x · Pos=${s.maxPositions} · $${s.contractPriceMax} cap
        </div>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">${tags}</div>`;
  }

  td.innerHTML = `<div class="daily-wrap">
    <h3>${configId} — Strategy Analysis</h3>
    ${analysisHtml}
    <h3 style="margin-top:8px">Daily Breakdown</h3>
    <div class="daily-grid">
      ${daily.map(d => {
        const pc = d.totalPnl > 0 ? 'pnl-pos' : d.totalPnl < 0 ? 'pnl-neg' : 'pnl-zero';
        return `<div class="daily-card" onclick="window.open(replayUrl('${configId}','${d.date}'),'_blank')">
          <span style="color:#666">${d.date.slice(5)}</span>
          <span>${d.trades}t ${(d.winRate*100).toFixed(0)}%</span>
          <span class="${pc}" style="font-weight:600">$${d.totalPnl.toFixed(0)}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
  tr.appendChild(td);
  rowEl.after(tr);
}

document.querySelectorAll('.sort-btn').forEach(btn => {

    if (col === currentSort) {
      currentDir = currentDir === 'DESC' ? 'ASC' : 'DESC';

      currentDir = col === 'worstDay' ? 'ASC' : 'DESC';

      th.classList.add('sorted');

    sortRows();
    renderTable();

// ── Config label — appends start time when it differs from market open (09:30) ──

function sweepConfigLabel(r) {
  const start = r.params?.activeStart;
  const isDefault = !start || start === '09:30' || start === '9:30';
  const suffix = isDefault ? '' : ` [${start}]`;
  return `${r.name || r.configId}${suffix}`;
}

// ── Replay URL builder (carries filter state) ──

function replayUrl(configId, date) {
  let url = `${_BASE}/replay/?config=${configId}`;
  if (date) url += `&date=${date}`;
  const maxEntry = document.getElementById('max-entry-price').value;
  const maxConcurrent = document.getElementById('max-concurrent').value;
  const maxTradesDay = document.getElementById('max-trades-day').value;
  if (maxEntry && maxEntry !== '0') url += `&maxEntry=${maxEntry}`;
  if (maxConcurrent && maxConcurrent !== '0') url += `&maxConcurrent=${maxConcurrent}`;
  if (maxTradesDay && maxTradesDay !== '0') url += `&maxTradesDay=${maxTradesDay}`;
  return url;
}

// ── Delete config ──

let pendingDeleteId = null;

function openDeleteModal(configId, name, days, trades) {
  pendingDeleteId = configId;
  document.getElementById('del-name').textContent = `${name} (${configId})`;
  document.getElementById('del-stats').textContent = `This will permanently remove ${days} day(s) of results and ${trades} trade records.`;
  document.getElementById('del-overlay').classList.add('active');
  document.getElementById('del-confirm-btn').onclick = confirmDelete;
}

function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById('del-overlay').classList.remove('active');
}

async function confirmDelete() {
  if (!pendingDeleteId) return;
  const configId = pendingDeleteId;
  closeDeleteModal();

  try {
    const res = await fetch(`${API}/config/${encodeURIComponent(configId)}`, { method: 'DELETE' });
    const data = await res.json();
    if (res.ok) {
      // Remove from in-memory data and re-render
      allRows = allRows.filter(r => r.configId !== configId);
      applyFilters();
      document.getElementById('total-count').textContent = allRows.length;
    } else {
      alert(`Delete failed: ${data.error || 'Unknown error'}`);
    }
  } catch (err) {
    alert(`Delete failed: ${err.message}`);
  }
}

// Close modal on Escape or overlay click
document.getElementById('del-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'del-overlay') closeDeleteModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeDeleteModal();
});

// ── Refresh (preserves filters + sort) ──

async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('refreshing');
  const statusEl = document.getElementById('refresh-status');

  // Snapshot current filter selections
  const savedFilters = { ...filters };
  const savedMultiFilters = {};
  for (const [k, v] of Object.entries(multiFilters)) savedMultiFilters[k] = new Set(v);
  const savedSort = currentSort;
  const savedDir = currentDir;

  // Snapshot sort-bar dropdown values (these trigger loadData on change normally)
  const sortBarState = {
    minDays: document.getElementById('min-days').value,
    maxEntry: document.getElementById('max-entry-price').value,
    maxConcurrent: document.getElementById('max-concurrent').value,
    maxTradesDay: document.getElementById('max-trades-day').value,
  };

  const prevCount = allRows.length;
  const prevIds = new Set(allRows.map(r => r.configId));

  try {
    let url = `${API}/sweep?limit=5000&minDays=${sortBarState.minDays}`;
    if (sortBarState.maxEntry && sortBarState.maxEntry !== '0') url += `&maxEntryPrice=${sortBarState.maxEntry}`;
    if (sortBarState.maxConcurrent && sortBarState.maxConcurrent !== '0') url += `&maxConcurrent=${sortBarState.maxConcurrent}`;
    if (sortBarState.maxTradesDay && sortBarState.maxTradesDay !== '0') url += `&maxTradesPerDay=${sortBarState.maxTradesDay}`;

    const res = await fetch(url);
    const data = await res.json();
    allRows = data.rows;
    document.getElementById('total-count').textContent = data.total;

    // Rebuild filter dropdowns
    buildFilters();
    updateSymbolPillCounts();
    updateBasketPillCounts();
    syncSymbolPillsFromFilters();

    // Restore filter selections
    for (const [key, val] of Object.entries(savedFilters)) {
      const sel = document.querySelector(`[data-filter="${key}"]`);
      if (sel) {
        // Check if the value still exists in the new data
        const optExists = [...sel.options].some(o => o.value === val);
        if (optExists) {
          sel.value = val;
          sel.classList.add('active');
          filters[key] = val;
        }
      }
    }

    // Restore multi-select filter selections
    for (const [key, savedSet] of Object.entries(savedMultiFilters)) {
      if (savedSet.size === 0) continue;
      const dd = document.getElementById(`ms-dd-${key}`);
      if (!dd) continue;
      const validSet = new Set();
      dd.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        if (savedSet.has(cb.value)) { cb.checked = true; validSet.add(cb.value); }
      });
      if (validSet.size > 0) { multiFilters[key] = validSet; updateMultiSelectBtn(key); }
    }

    // Restore sort
    currentSort = savedSort;
    currentDir = savedDir;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === currentSort));
    document.querySelectorAll('th').forEach(th => {
      th.classList.remove('sorted');
      const a = th.querySelector('.arrow');
      if (a) a.remove();
    });
    const th = document.querySelector(`th[data-col="${currentSort}"]`);
    if (th) {
      th.classList.add('sorted');
      th.innerHTML += `<span class="arrow">${currentDir === 'DESC' ? '▼' : '▲'}</span>`;
    }

    applyFilters();

    // Show what changed
    const newIds = new Set(allRows.map(r => r.configId));
    const added = allRows.filter(r => !prevIds.has(r.configId)).length;
    const removed = [...prevIds].filter(id => !newIds.has(id)).length;
    const updated = allRows.filter(r => prevIds.has(r.configId)).length;

    if (added > 0 || removed > 0) {
      const parts = [];
      if (added > 0) parts.push(`+${added} new`);
      if (removed > 0) parts.push(`-${removed} removed`);
      statusEl.textContent = `Updated: ${parts.join(', ')}`;
      statusEl.style.color = '#10b981';
    } else {
      statusEl.textContent = 'Up to date';
      statusEl.style.color = '#555';
    }
    setTimeout(() => { statusEl.textContent = ''; }, 5000);

  } catch (err) {
    statusEl.textContent = `Refresh failed: ${err.message}`;
    statusEl.style.color = '#f43f5e';
    setTimeout(() => { statusEl.textContent = ''; }, 5000);
  } finally {
    btn.classList.remove('refreshing');
  }
}

// ── Live config ──

async function fetchLiveConfigId() {
  try {
    const cfg = await fetch(`${API}/live/agent/config`).then(r => r.json());
    if (cfg && !cfg.error && cfg.id) {
      liveConfigId = cfg.id;
    }
  } catch {}
  try {
    const basket = await fetch(`${API}/live/basket`).then(r => r.json());
    if (basket && basket.deployed && basket.basketConfigId) {
      liveBasketId = basket.basketConfigId;
    }
  } catch {}
  // Refresh the LIVE indicator in the header.
  const el = document.getElementById('live-indicator');
  const idEl = document.getElementById('live-cfg-id');
  if (liveBasketId) {
    el.style.display = 'inline-flex';
    idEl.textContent = `BASKET ${liveBasketId}`;
  } else if (liveConfigId) {
    el.style.display = 'inline-flex';
    idEl.textContent = liveConfigId;
  }
}

// ── Basket deploy ──────────────────────────────────────────────────────
// Fans out a basket config into N LIVE agents — one per member — each with
// its own derived AGENT_CONFIG_ID. There is no paper mode. Agents are
// written to ecosystem.config.js in a PAUSED state (AGENT_PAPER='false',
// pm2 entry present but not started). The backend returns the pm2 start
// command; nothing places real orders until the operator runs it.
async function deployBasket(configId, name, memberCount) {
  const ok = confirm(
    `Deploy basket "${name}" as ${memberCount} LIVE agents?\n\n` +
    `Each member runs its own spx_agent with a derived AGENT_CONFIG_ID.\n` +
    `All agents are AGENT_PAPER='false' — real orders against live broker.\n\n` +
    `Deploy is PAUSED: agents are written to ecosystem.config.js but NOT started.\n` +
    `You must run the returned pm2 start command to activate them.\n\n` +
    `[OK] = write agents (paused, live config)\n` +
    `[Cancel] = abort`
  );
  if (!ok) return;

  try {
    const res = await fetch(`${API}/set-live-basket`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ configId }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    liveBasketId = configId;
    renderTable();
    showBasketDeployModal(data);
  } catch (err) {
    alert('Failed to deploy basket: ' + err.message);
  }
}

async function removeBasketFromEcosystem() {
  if (!confirm('Remove the basket agent block from ecosystem.config.js?\n\nThis does NOT stop already-running PM2 agents — run the pm2 delete command for that.')) return;
  try {
    const res = await fetch(`${API}/stop-live-basket`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');
    liveBasketId = null;
    const modal = document.getElementById('basket-deploy-modal');
    if (modal) modal.remove();
    renderTable();
    alert(`Removed ${data.removed} basket agents from ecosystem.config.js.` + (data.pm2StopCmd ? `\n\nIf they're still running, stop them:\n${data.pm2StopCmd}` : ''));
  } catch (err) {
    alert('Failed to clear basket block: ' + err.message);
  }
}

async function setLiveConfig(configId, name, score) {
  if (!confirm(`Set "${name}" (score: ${score}) as the live trading config?\n\nThis updates AGENT_CONFIG_ID in ecosystem.config.js.\nThe agent will use it on next restart.`)) {
    return;
  }

  try {
    const res = await fetch(`${API}/set-live-config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ configId }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Failed');

    liveConfigId = configId;
    document.getElementById('live-indicator').style.display = 'inline-flex';
    document.getElementById('live-cfg-id').textContent = configId;
    renderTable(); // re-render to update badges

    const statusEl = document.getElementById('refresh-status');
    statusEl.textContent = `✓ Live config set to ${configId}`;
    statusEl.style.color = '#3b82f6';
    setTimeout(() => { statusEl.textContent = ''; }, 5000);
  } catch (err) {
    alert('Failed to set live config: ' + err.message);
  }
}

// ── Load ──

async function loadData() {
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('active');

  const minDays = document.getElementById('min-days').value;
  const maxEntry = document.getElementById('max-entry-price').value;
  const maxConcurrent = document.getElementById('max-concurrent').value;
  const maxTradesDay = document.getElementById('max-trades-day').value;
  let url = `${API}/sweep?limit=5000&minDays=${minDays}`;
  if (maxEntry && maxEntry !== '0') url += `&maxEntryPrice=${maxEntry}`;
  if (maxConcurrent && maxConcurrent !== '0') url += `&maxConcurrent=${maxConcurrent}`;
  if (maxTradesDay && maxTradesDay !== '0') url += `&maxTradesPerDay=${maxTradesDay}`;
  const res = await fetch(url);
  const data = await res.json();
  allRows = data.rows;
  document.getElementById('total-count').textContent = data.total;

  overlay.classList.remove('active');

  buildFilters();
  updateSymbolPillCounts();
  syncSymbolPillsFromFilters();

  // Apply URL params as initial filters
  const urlParams = new URLSearchParams(window.location.search);
  for (const [key, val] of urlParams) {
    const sel = document.querySelector(`[data-filter="${key}"]`);
    if (sel) { sel.value = val; sel.classList.add('active'); filters[key] = val; }
  }

  applyFilters();
}

fetchLiveConfigId().then(() => loadData());
</script>
</body>
</html>
